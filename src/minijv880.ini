#
# minijv880.ini
#

# Mini-JV880 engine instruction lenght
# Depends used RPI model (CPU, FREQ), Audio Samplerate
# Bigger - slower, Less - faster
# Zero 2w = 12
# RPI3 = 10
# RPI4 = 8
# RPI5 = 5
MCUcycles=12

# Load Expanded ROM at start
# 1 SR-JV80-01 Pop - CS 0x3F1CF705.bin
# 2 SR-JV80-02 Orchestral - CS 0x3F0E09E2.BIN
# 3 SR-JV80-03 Piano - CS 0x3F8DB303.bin
# 4 SR-JV80-04 Vintage Synth - CS 0x3E23B90C.BIN
# 5 SR-JV80-05 World - CS 0x3E8E8A0D.bin
# 6 SR-JV80-06 Dance - CS 0x3EC462E0.bin
# 7 SR-JV80-07 Super Sound Set - CS 0x3F1EE208.bin
# 8 SR-JV80-08 Keyboards of the 60s and 70s - CS 0x3F1E3F0A.BIN
# 9 SR-JV80-09 Session - CS 0x3F381791.BIN33333333333333333333333333333333333333333333333333333333333333333333
# 10 SR-JV80-10 Bass & Drum - CS 0x3D83D02A.BIN
# 11 SR-JV80-11 Techno - CS 0x3F046250.bin
# 12 SR-JV80-12 HipHop - CS 0x3EA08A19.BIN
# 13 SR-JV80-13 Vocal - CS 0x3ECE78AA.bin
# 14 SR-JV80-14 Asia - CS 0x3C8A1582.bin
# 15 SR-JV80-15 Special FX - CS 0x3F591CE4.bin
# 16 SR-JV80-16 Orchestral II - CS 0x3F35B03B.bin
# 17 SR-JV80-17 Country - CS 0x3ED75089.bin
# 18 SR-JV80-18 Latin - CS 0x3EA51033.BIN
# 19 SR-JV80-19 House - CS 0x3E330C41.BIN
ExpRom=0 # if 0 Expanded rom not loaded


# Sound device
SoundDevice=i2s
#SoundDevice=pwm
#SoundDevice=hdmi
SampleRate=64000
#ChunkSize=256
DACI2CAddress=0
ChannelsSwapped=0

# MIDI
MIDIBaudRate=31250
#MIDIThru=umidi1,ttyS1
IgnoreAllNotesOff=0

# Any LCD present ?
LCDEnabled=1

# HD44780 LCD
LCDPinEnable=17
LCDPinRegisterSelect=4
LCDPinReadWrite=0
LCDPinData4=22
LCDPinData5=23
LCDPinData6=24
LCDPinData7=25
LCDI2CAddress=0x00

# SSD1306 LCD
# For a 128x32 display, set LCDColumns=20; LCDRows=2
# For a 128x64 display, set LCDColumns=20; LCDRows=4
# For a 128x64 SSD1305 set SSD1306LCDWidth=132 
SSD1306LCDI2CAddress=0x3c
SSD1306LCDWidth=132
SSD1306LCDHeight=32
SSD1306LCDRotate=1
SSD1306LCDMirror=0

# ST7789 LCD
# SPIBus=0 for any RPi (GPIO 10,11,8,7).
#     Note: Leave blank (default) if no SPI device required.
# Select=0|1 for CE0 or CE1
# Data = GPIO pin number
# Optional: Reset, Backlight = GPIO pin numbers
# Rotation=0,90,180,270
# SmallFont=0 (default), 1
#
# For a 240 wide display set LCDColumns=15 with LCDRows=2
SPIBus=
ST7789Enabled=0
ST7789Data=
ST7789Select=
ST7789Reset=
ST7789Backlight=
ST7789Width=240
ST7789Height=240
ST7789Rotation=0
ST7789SmallFont=0

# Default is 16x2 display (e.g. HD44780)
LCDColumns=20
LCDRows=2

# GPIO Button Navigation
#  Any buttons set to 0 will be ignored
ButtonPinPreview=17
ButtonActionPreview=click
ButtonPinLeft=27
ButtonActionLeft=click
ButtonPinRight=22
ButtonActionRight=click
ButtonPinData=12
ButtonActionData=click
ButtonPinToneSelect=13
ButtonActionToneSelect=click
ButtonPinPatchPerform=23
ButtonActionPatchPerform=click
ButtonPinEdit=24
ButtonActionEdit=click
ButtonPinSystem=5
ButtonActionSystem=click
ButtonPinRhythm=
ButtonActionRhythm=
ButtonPinUtility=6
ButtonActionUtility=click
ButtonPinMute=
ButtonActionMute=
ButtonPinMonitor=
ButtonActionMonitor=
ButtonPinCompare=
ButtonActionCompare=
ButtonPinEnter=11
ButtonActionEnter=click
ButtonPinUp=
ButtonActionUp=
ButtonPinDown=
ButtonActionDown= 

# MIDI Channel for receive button commands
# 1-16, if set 17 - commands received from any channel
MIDIButtonCh=17
# MIDI CC commands
MIDIButtonPreview=46
MIDIButtonLeft=47
MIDIButtonRight=48
MIDIButtonData=49
MIDIButtonToneSelect=50
MIDIButtonPatchPerform=51
MIDIButtonEdit=52
MIDIButtonSystem=53
MIDIButtonRhythm=54
MIDIButtonUtility=55
MIDIButtonMute=56
MIDIButtonMonitor=57
MIDIButtonCompare=58
MIDIButtonEnter=59
MIDIButtonUp=60
MIDIButtonDown=61
MIDISaveNVRAM=56

# MIDI Encoder Enabled
MIDIEncoder=1
MIDIEncoderCC=62
# Relative encoder command if 0 mean <64
# if not 0 mean >64
MIDIEncoderUp=1
MIDIEncoderDown=0


# Timeouts in milliseconds for double click and long press
DoubleClickTimeout=400
LongPressTimeout=400

# KY-040 Rotary Encoder
EncoderEnabled=1
EncoderPinClock=10
EncoderPinData=9

# Debug
MIDIDumpEnabled=0
ProfileEnabled=0

# Network
NetworkEnabled=0
NetworkDHCP=1
# NetworkType ( wlan ; ethernet )
NetworkType=wlan
NetworkHostname=MiniJV880
NetworkIPAddress=0
NetworkSubnetMask=0
NetworkDefaultGateway=0
NetworkDNSServer=0
NetworkFTPEnabled=0
NetworkSyslogEnabled=0
NetworkSyslogServerIPAddress=0
# UDP MIDI (optional)
#UDPMIDIEnabled=0
#UDPMIDIIPAddress=255.255.255.255    ; destination IP for UDP MIDI (default: broadcast)
# Note: set UDPMIDIIPAddress=0.0.0.0 to disable UDP MIDI transmit
# UDP MIDI uses port 1999 by default.